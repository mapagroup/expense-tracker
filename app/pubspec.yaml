    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  # android: true
  # ios: true
  # image_path: "assets/icons/app_icon.png"
  # adaptive_icon_background: "#FFFFFF"
