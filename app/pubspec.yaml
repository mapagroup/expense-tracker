name: mapa_money
description: "Mapa Money – a personal finance app to track, categorise, and analyse your daily expenses. Add and manage expenses across categories (Food, Transport, Bills, Entertainment and more), filter by month, and get an instant overview of your spending with category totals and percentages."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  intl: ^0.20.2
  path: ^1.9.0
  path_provider: ^2.1.5
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#0F3D3E"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
