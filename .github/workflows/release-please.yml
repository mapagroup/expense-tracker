name: Release automation

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release automation
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          manifest-file: .release-please-manifest.json
          config-file: release-please-config.json

  # After a real release is created, build the release APKs + AAB
  build-release-artifacts:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Flutter SDK
        id: flutter-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ runner.temp }}/flutter
          key: flutter-stable-${{ runner.os }}

      - name: Install Flutter SDK
        if: steps.flutter-cache.outputs.cache-hit != 'true'
        run: git clone --depth 1 --branch stable https://github.com/flutter/flutter.git "${{ runner.temp }}/flutter"

      - name: Add Flutter to PATH
        run: echo "${{ runner.temp }}/flutter/bin" >> $GITHUB_PATH

      - name: Cache pub dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Get dependencies
        run: flutter pub get

      # Decode the keystore from a base64 secret
      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks

      # Build per-ABI split APKs (arm64-v8a, armeabi-v7a, x86_64)
      # Each is ~15–20 MB instead of a fat ~60 MB universal APK.
      - name: Build release APKs (split per ABI)
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: flutter build apk --release --split-per-abi

      # Build AAB for Play Store
      - name: Build release AAB
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: flutter build appbundle --release

      # Attach all APKs + AAB to the GitHub Release so users can
      # download and sideload the correct APK for their device.
      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            app/build/app/outputs/flutter-apk/app-x86_64-release.apk
            app/build/app/outputs/bundle/release/app-release.aab
