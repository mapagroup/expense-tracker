name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # 1. Lint & Format
  # ──────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache Flutter SDK
        id: flutter-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ runner.temp }}/flutter
          key: flutter-stable-${{ runner.os }}

      - name: Install Flutter SDK
        if: steps.flutter-cache.outputs.cache-hit != 'true'
        run: git clone --depth 1 --branch stable https://github.com/flutter/flutter.git "${{ runner.temp }}/flutter"

      - name: Add Flutter to PATH
        run: echo "${{ runner.temp }}/flutter/bin" >> $GITHUB_PATH

      - name: Cache pub dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Get dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze (no errors/warnings)
        run: flutter analyze --fatal-infos

  # ──────────────────────────────────────────────
  # 2. Unit & Widget Tests
  # ──────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache Flutter SDK
        id: flutter-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ runner.temp }}/flutter
          key: flutter-stable-${{ runner.os }}

      - name: Install Flutter SDK
        if: steps.flutter-cache.outputs.cache-hit != 'true'
        run: git clone --depth 1 --branch stable https://github.com/flutter/flutter.git "${{ runner.temp }}/flutter"

      - name: Add Flutter to PATH
        run: echo "${{ runner.temp }}/flutter/bin" >> $GITHUB_PATH

      - name: Cache pub dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload coverage report
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          files: app/coverage/lcov.info
          fail_ci_if_error: false

  # ──────────────────────────────────────────────
  # 3. Build APK (compile check)
  # ──────────────────────────────────────────────
  build:
    name: Build APK
    runs-on: ubuntu-latest
    needs: [lint, test]
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Flutter SDK
        id: flutter-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ runner.temp }}/flutter
          key: flutter-stable-${{ runner.os }}

      - name: Install Flutter SDK
        if: steps.flutter-cache.outputs.cache-hit != 'true'
        run: git clone --depth 1 --branch stable https://github.com/flutter/flutter.git "${{ runner.temp }}/flutter"

      - name: Add Flutter to PATH
        run: echo "${{ runner.temp }}/flutter/bin" >> $GITHUB_PATH

      - name: Cache pub dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Get dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

  # ──────────────────────────────────────────────
  # 4. Security – CodeQL
  # ──────────────────────────────────────────────
  codeql:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          languages: java-kotlin
          queries: security-and-quality

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Flutter SDK
        id: flutter-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ runner.temp }}/flutter
          key: flutter-stable-${{ runner.os }}

      - name: Install Flutter SDK
        if: steps.flutter-cache.outputs.cache-hit != 'true'
        run: git clone --depth 1 --branch stable https://github.com/flutter/flutter.git "${{ runner.temp }}/flutter"

      - name: Add Flutter to PATH
        run: echo "${{ runner.temp }}/flutter/bin" >> $GITHUB_PATH

      - name: Cache pub dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Build for CodeQL
        working-directory: app
        run: |
          flutter pub get
          flutter build apk --debug

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          category: /language:java-kotlin
